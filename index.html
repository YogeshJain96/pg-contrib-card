<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PostgreSQL Commitfest Contributor Card</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;padding:32px 16px;
    background:radial-gradient(120% 100% at 50% 0%,#10243a 0%,#0a1826 55%,#071019 100%);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#eaf1f7}
  .shell{max-width:520px;margin:0 auto}
  header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#5b9bd5;font-weight:700}
  h1{margin:2px 0 0;font-size:25px;font-weight:800;letter-spacing:-.5px}
  .row{display:flex;gap:8px;margin-bottom:12px}
  input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid #24425f;background:#0d1f31;
    color:#eaf1f7;font-size:15px;outline:none}
  input:focus{border-color:#5b9bd5}
  button{padding:0 20px;border-radius:10px;border:none;cursor:pointer;background:#f5b301;
    color:#0a1826;font-weight:800;font-size:15px}
  button:disabled{opacity:.5;cursor:default}
  .opt{display:flex;align-items:center;gap:8px;font-size:13px;color:#9db8d0;margin-bottom:14px}
  .opt input{flex:none;width:auto}
  .statusbar{display:flex;align-items:center;gap:10px;font-size:13px;color:#9db8d0;margin-bottom:12px}
  .track{flex:1;height:5px;background:#173049;border-radius:5px;overflow:hidden}
  .fill{height:100%;width:0;background:#f5b301;transition:width .2s}
  .err{background:#3a1a1a;border:1px solid #6b2b2b;color:#f4b4b4;padding:12px 14px;border-radius:10px;
    font-size:13px;margin-bottom:12px;line-height:1.55}
  .matches{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .match{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;
    border:1px solid #24425f;background:#0d1f31;color:#eaf1f7;cursor:pointer;text-align:left}
  .match:hover{border-color:#5b9bd5}
  .match .n{font-weight:700;font-size:15px}
  .match .h{font-size:12px;color:#5b9bd5}
  .actions{display:flex;gap:8px;margin:14px 0 0}
  .ghost{background:#0d1f31;border:1px solid #24547f;color:#eaf1f7;font-weight:700;font-size:13px;padding:10px 16px}
  .foot{font-size:11px;color:#5f7d97;line-height:1.6;margin-top:18px}
  .foot a{color:#5b9bd5;text-decoration:none}
  .foot a:hover{text-decoration:underline}
  code{background:#071522;border:1px solid #1c3c59;border-radius:5px;padding:1px 6px;font-size:11.5px;color:#9fd0ff}

  /* ---- card ---- */
  .card{position:relative;overflow:hidden;border-radius:18px;padding:26px;margin-top:18px;
    background:linear-gradient(160deg,#123354 0%,#0c2137 100%);border:1px solid #24547f;
    box-shadow:0 24px 60px -20px rgba(0,0,0,.6)}
  .glow{position:absolute;top:-80px;right:-60px;width:220px;height:220px;
    background:radial-gradient(circle,rgba(245,179,1,.18),transparent 70%);pointer-events:none}
  .chead{display:flex;align-items:center;gap:14px;margin-bottom:22px;position:relative}
  .cname{font-size:22px;font-weight:800;letter-spacing:-.3px}
  .chandle{font-size:13px;color:#5b9bd5;margin-top:2px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .stat{background:#0a1c2e;border:1px solid #1c3c59;border-radius:12px;padding:14px 8px;text-align:center}
  .statN{font-size:25px;font-weight:800;line-height:1}
  .statL{font-size:10px;color:#8fabc4;margin-top:6px;text-transform:uppercase;letter-spacing:.6px}
  .block{margin-bottom:20px}.block:last-child{margin-bottom:0}
  .bl{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#5b9bd5;font-weight:700;margin-bottom:10px}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{display:inline-flex;align-items:center;gap:6px;background:#0a1c2e;border:1px solid #24547f;
    border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600}
  .tagN{background:#f5b301;color:#0a1826;border-radius:999px;padding:0 6px;font-size:11px;font-weight:800}
  .ri{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #16324c}
  .dot{width:8px;height:8px;border-radius:999px;flex-shrink:0}
  .rt{flex:1;font-size:13px;color:#dbe7f2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rs{font-size:11px;color:#8fabc4;flex-shrink:0}
  .verB{font-size:10px;font-weight:700;color:#0a1826;background:#5b9bd5;border-radius:999px;padding:1px 7px;flex-shrink:0}
</style>
</head>
<body>
<div class="shell">
  <header>
    <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="32" fill="#0f2b46"></circle>
      <ellipse cx="21" cy="30" rx="9" ry="11" fill="#5b9bd5" stroke="#eaf1f7" stroke-width="1.4"></ellipse>
      <circle cx="35" cy="27" r="12" fill="#5b9bd5" stroke="#eaf1f7" stroke-width="1.4"></circle>
      <path d="M30 37c-1 4-3 6-2 10 1 3 4 4 6 2" fill="none" stroke="#5b9bd5" stroke-width="5" stroke-linecap="round"></path>
      <path d="M30 37c-1 4-3 6-2 10 1 3 4 4 6 2" fill="none" stroke="#eaf1f7" stroke-width="1.2" stroke-linecap="round"></path>
      <circle cx="39" cy="24" r="1.8" fill="#0f2b46"></circle>
    </svg>
    <div>
      <div class="eyebrow">PostgreSQL · Commitfest</div>
      <h1>Contributor Card</h1>
    </div>
  </header>

  <div class="row">
    <input id="q" placeholder="Commitfest handle or name" autocomplete="off">
    <button id="go">Find</button>
  </div>
  <label class="opt"><input type="checkbox" id="one"> Quick scan (current commitfest only)</label>

  <div id="status" style="display:none" class="statusbar">
    <span id="statusText"></span>
    <div class="track"><div id="fill" class="fill"></div></div>
  </div>
  <div id="err" style="display:none" class="err"></div>
  <div id="matches" class="matches"></div>
  <div id="cardWrap"></div>
  <div id="actions" style="display:none" class="actions">
    <button class="ghost" id="dlPng">Download PNG</button>
    <button class="ghost" id="copyLink">Copy link</button>
    <button class="ghost" id="shareLi">Share to LinkedIn</button>
  </div>

  <div class="foot">
    Generated from <a href="https://commitfest.postgresql.org/help/" target="_blank" rel="noopener">commitfest.postgresql.org</a> ·
    <a href="https://github.com/YogeshJain96/pg-contrib-card" target="_blank" rel="noopener">Source on GitHub</a>
  </div>
</div>

<script>
const BASE = "https://commitfest.postgresql.org";
const COMMITFESTS = [
  [60,"PG20-Drafts"],[61,"PG20-2"],[59,"PG20-1"],[58,"PG19-Final"],[54,"PG19-Drafts"],
  [57,"PG19-4"],[56,"PG19-3"],[55,"PG19-2"],[53,"PG19-1"],[52,"2025-03"],[51,"2025-01"],
  [50,"2024-11"],[49,"2024-09"],[48,"2024-07"],[47,"2024-03"],[46,"2024-01"],[45,"2023-11"],
  [44,"2023-09"],[43,"2023-07"],[42,"2023-03"],[41,"2023-01"],[40,"2022-11"],[39,"2022-09"],
  [38,"2022-07"],[37,"2022-03"],[36,"2022-01"],[35,"2021-11"],[34,"2021-09"],[33,"2021-07"],
  [32,"2021-03"],[31,"2021-01"],[30,"2020-11"],[29,"2020-09"],[28,"2020-07"],[27,"2020-03"],
  [26,"2020-01"],[25,"2019-11"],[24,"2019-09"],[23,"2019-07"],[22,"2019-03"],[21,"2019-01"],
  [20,"2018-11"],[19,"2018-09"],[18,"2018-07"],[17,"2018-03"],[16,"2018-01"],[15,"2017-11"],
  [14,"2017-09"],[13,"2017-03"],[12,"2017-01"],[11,"2016-11"],[10,"2016-09"],[9,"2016-03"],
  [8,"2016-01"],[7,"2015-11"],[6,"2015-09"],[5,"2015-07"],[4,"2015-02"],[3,"2014-12"]
];
const ACTIVE = ["Needs review","Waiting on Author","Ready for Committer"];
// Commitfest label -> PostgreSQL version its committed patches ship in.
// The 2016 dev cycle shipped PG10; earlier cycles are the 9.x series.
function cfVersion(label){
  const m=label.match(/^PG(\d+)/); if(m) return String(+m[1]);
  const d=label.match(/^(\d{4})-(\d{2})$/); if(!d) return null;
  const year=+d[1], mo=+d[2], cs=mo>=7?year:year-1;
  const n=10+(cs-2016);
  return n>=10 ? String(n) : "9."+(6+(cs-2015));
}
const verKey=v=>{const[a,b]=v.split(".");return +a*100+(b?+b:99);};
// "3 months ago" -> approximate days (smaller = more recent).
function ageToDays(s){
  if(!s) return Infinity; s=s.toLowerCase().trim();
  if(s==="today"||s==="just now") return 0; if(s==="yesterday") return 1;
  const m=s.match(/(\d+)\s+(day|week|month|year)/); if(!m) return Infinity;
  return +m[1]*{day:1,week:7,month:30,year:365}[m[2]];
}

// Try direct first (proves whether CORS allows it), then proxies.
const PROXIES = [
  {name:"direct",     wrap:u=>u},
  {name:"cors.sh",    wrap:u=>"https://proxy.cors.sh/"+u},
  {name:"allorigins", wrap:u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u)},
  {name:"codetabs",   wrap:u=>"https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(u)}
];
let workingProxy = null; // remember the first one that works

async function getText(url){
  const order = workingProxy ? [workingProxy, ...PROXIES.filter(p=>p!==workingProxy)] : PROXIES;
  let lastErr;
  for(const p of order){
    try{
      const r = await fetch(p.wrap(url), {signal:AbortSignal.timeout(20000)});
      if(!r.ok){ lastErr=new Error("HTTP "+r.status); console.warn("["+p.name+"] "+r.status); continue; }
      const t = await r.text();
      if(t && t.length>20){ if(!workingProxy){workingProxy=p; console.log("using proxy:",p.name);} return t; }
      lastErr=new Error("empty");
    }catch(e){ lastErr=e; console.warn("["+p.name+"] "+e.name+": "+e.message); }
  }
  throw lastErr||new Error("all failed");
}

// ---- parsing ----
function parseLookup(json){
  const d = JSON.parse(json);
  return (d.values||[]).map(v=>{
    const m = v.value.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
    return {id:v.id, name:m?m[1].trim():v.value, handle:m?m[2]:""};
  });
}
function parsePatches(html){
  const out=[]; const rowRe=/<tr>([\s\S]*?)<\/tr>/g; let m;
  while((m=rowRe.exec(html))!==null){
    const row=m[1]; if(!/\/patch\/\d+\//.test(row)) continue;
    const id=(row.match(/\/patch\/(\d+)\//)||[])[1]||null;
    const title=(row.match(/\/patch\/\d+\/">([^<]+)<\/a>/)||[])[1]||"(untitled)";
    const status=(row.match(/<span class="badge[^"]*"[^>]*>([^<]+)<\/span>/)||[])[1]||"Unknown";
    const tags=[]; const tr=/\?tag=\d+"[\s\S]*?title="[^"]*">([^<]+)<\/span>/g; let t;
    while((t=tr.exec(row))!==null) tags.push(t[1].trim());
    const cells=[...row.matchAll(/<td[^>]*>([\s\S]*?)<\/td>/g)].map(c=>c[1].replace(/<[^>]+>/g,'').trim());
    const latestMail=cells.length?cells[cells.length-1]:"";
    out.push({id,title:title.trim(),status:status.trim(),tags,latestMail});
  }
  return out;
}
function aggregate(pages){
  const byPatch=new Map(); const cfs=new Set(); const versions={};
  for(const pg of pages){
    if(pg.patches.length) cfs.add(pg.cf);
    const pgVer=cfVersion(pg.label);
    for(const p of pg.patches){ if(!p.id) continue;
      const days=ageToDays(p.latestMail); const committed=p.status==="Committed";
      let rec=byPatch.get(p.id);
      if(!rec){ rec={id:p.id,title:p.title,status:p.status,tags:p.tags,days,version:null}; byPatch.set(p.id,rec); }
      if(days<rec.days){ rec.title=p.title; rec.status=p.status; rec.tags=p.tags; rec.days=days; }
      if(committed&&pgVer){ rec.version=pgVer; rec.status="Committed"; (versions[pgVer]=versions[pgVer]||new Set()).add(p.id); }
    }
  }
  const all=[...byPatch.values()]; const tc={};
  for(const p of all) for(const tag of p.tags) tc[tag]=(tc[tag]||0)+1;
  return {
    totalPatches:all.length,
    committed:all.filter(p=>p.status==="Committed").length,
    active:all.filter(p=>ACTIVE.includes(p.status)).length,
    cfsActive:cfs.size,
    topTags:Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,6),
    recent:[...all].sort((a,b)=>a.days-b.days).slice(0,8),
    versions:Object.keys(versions).sort((a,b)=>verKey(b)-verKey(a)).map(v=>[v,versions[v].size])
  };
}

// ---- rendering ----
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function cardHtml(person,stats){
  const dot=s=>s==="Committed"?"#4ade80":s==="Ready for Committer"?"#fbbf24":"#60a5fa";
  const cell=(n,l,a)=>`<div class="stat"><div class="statN" style="color:${a?"#f5b301":"#eaf1f7"}">${n}</div><div class="statL">${l}</div></div>`;
  const tags=stats.topTags.map(([t,n])=>`<span class="tag">${esc(t)}<span class="tagN">${n}</span></span>`).join("");
  const versions=(stats.versions||[]).map(([v,n])=>`<span class="tag">PG ${v}<span class="tagN">${n}</span></span>`).join("");
  const recent=stats.recent.map(p=>`<div class="ri"><span class="dot" style="background:${dot(p.status)}"></span><span class="rt">${esc(p.title)}</span>${p.version?`<span class="verB">PG ${esc(p.version)}</span>`:""}<span class="rs">${esc(p.status)}</span></div>`).join("");
  return `<div class="card"><div class="glow"></div>
    <div class="chead">
      <svg width="46" height="46" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="32" fill="#0f2b46"></circle><ellipse cx="21" cy="30" rx="9" ry="11" fill="#5b9bd5" stroke="#eaf1f7" stroke-width="1.4"></ellipse><circle cx="35" cy="27" r="12" fill="#5b9bd5" stroke="#eaf1f7" stroke-width="1.4"></circle><path d="M30 37c-1 4-3 6-2 10 1 3 4 4 6 2" fill="none" stroke="#5b9bd5" stroke-width="5" stroke-linecap="round"></path><path d="M30 37c-1 4-3 6-2 10 1 3 4 4 6 2" fill="none" stroke="#eaf1f7" stroke-width="1.2" stroke-linecap="round"></path><circle cx="39" cy="24" r="1.8" fill="#0f2b46"></circle></svg>
      <div style="flex:1"><div class="eyebrow">PostgreSQL · Commitfest</div><div class="cname">${esc(person.name)}</div>${person.handle?`<div class="chandle">@${esc(person.handle)}</div>`:""}</div>
    </div>
    <div class="grid">${cell(stats.totalPatches,"Patches",1)}${cell(stats.committed,"Committed")}${cell(stats.active,"Active")}${cell(stats.cfsActive,"Commitfests")}</div>
    ${versions?`<div class="block"><div class="bl">Shipped in</div><div class="tags">${versions}</div></div>`:""}
    ${tags?`<div class="block"><div class="bl">Focus areas</div><div class="tags">${tags}</div></div>`:""}
    ${recent?`<div class="block"><div class="bl">Recent patches</div>${recent}</div>`:""}
  </div>`;
}
// ---- ui glue ----
const $=id=>document.getElementById(id);
function setStatus(txt,pct){ $("status").style.display="flex"; $("statusText").textContent=txt; if(pct!=null)$("fill").style.width=pct+"%"; }
function hideStatus(){ $("status").style.display="none"; $("fill").style.width="0"; }
function showErr(m){ $("err").style.display="block"; $("err").textContent=m; }
function clearErr(){ $("err").style.display="none"; }

async function find(){
  clearErr(); $("matches").innerHTML=""; $("cardWrap").innerHTML=""; $("actions").style.display="none";
  const q=$("q").value.trim(); if(!q) return;
  // Reflect the search in the address bar so it's shareable/bookmarkable.
  const u=new URL(location.href); u.search="";
  u.searchParams.set("q",q);
  if($("one").checked) u.searchParams.set("quick","1");
  history.replaceState(null,"",u);
  $("go").disabled=true; setStatus("Looking up contributor…");
  try{
    const found=parseLookup(await getText(`${BASE}/lookups/user/?cf=59&query=${encodeURIComponent(q)}`));
    hideStatus();
    if(!found.length){ showErr(`No contributor found for "${q}".`); return; }
    if(found.length===1){ build(found[0]); return; }
    $("matches").innerHTML=`<div style="font-size:12px;color:#9db8d0">Select a contributor</div>`+
      found.map((m,i)=>`<button class="match" data-i="${i}"><span class="n">${esc(m.name)}</span><span class="h">@${esc(m.handle)} · id ${m.id}</span></button>`).join("");
    [...document.querySelectorAll(".match")].forEach(b=>b.onclick=()=>{ $("matches").innerHTML=""; build(found[+b.dataset.i]); });
  }catch(e){
    hideStatus();
    showErr(`Lookup failed (${e.message}). Direct browser access is blocked by the site's missing CORS headers, and the fallback proxies are unreachable right now.`);
  }finally{ $("go").disabled=false; }
}

async function build(person){
  $("matches").innerHTML="";
  const list = $("one").checked ? COMMITFESTS.filter(([cf])=>cf===59) : COMMITFESTS;
  const pages=[];
  for(let i=0;i<list.length;i++){
    const [cf,label]=list[i];
    setStatus(`Scanning ${label} (${i+1}/${list.length})…`, Math.round((i+1)/list.length*100));
    try{ pages.push({cf,label,patches:parsePatches(await getText(`${BASE}/${cf}/?author=${person.id}`))}); }
    catch{ pages.push({cf,label,patches:[]}); }
  }
  hideStatus();
  const stats=aggregate(pages);
  $("cardWrap").innerHTML=cardHtml(person,stats);
  $("actions").style.display="flex";

  const cardEl=()=>$("cardWrap").querySelector(".card");
  const fname=ext=>(person.handle||"contributor")+"-card."+ext;
  const save=(dataUrl,ext)=>{ const a=document.createElement("a"); a.href=dataUrl; a.download=fname(ext); a.click(); };

  // High-resolution PNG: render at 3x on an opaque background.
  $("dlPng").onclick=async()=>{
    const btn=$("dlPng"), label=btn.textContent; btn.textContent="Rendering…"; btn.disabled=true;
    try{
      save(await htmlToImage.toPng(cardEl(),{pixelRatio:3, backgroundColor:"#0a1826", style:{margin:"0"}}),"png");
    }catch(e){ showErr("PNG export failed: "+e.message); }
    finally{ btn.textContent=label; btn.disabled=false; }
  };

  // Shareable link that re-runs this exact search for anyone who opens it.
  const shareUrl=()=>{
    const u=new URL(location.href); u.search="";
    u.searchParams.set("q", person.handle||person.name);
    if($("one").checked) u.searchParams.set("quick","1");
    return u.toString();
  };
  $("copyLink").onclick=async()=>{
    const btn=$("copyLink");
    try{ await navigator.clipboard.writeText(shareUrl()); btn.textContent="Link copied!"; }
    catch{ showErr("Clipboard blocked — link: "+shareUrl()); btn.textContent="Copy link"; }
    setTimeout(()=>btn.textContent="Copy link",1600);
  };
  $("shareLi").onclick=()=>{
    const url="https://www.linkedin.com/sharing/share-offsite/?url="+encodeURIComponent(shareUrl());
    window.open(url,"_blank","noopener,width=600,height=680");
  };
}

$("go").onclick=find;
$("q").addEventListener("keydown",e=>{ if(e.key==="Enter") find(); });

// Query-URL support: ?q=<handle>  (alias ?query=, ?user=), optional &one=1 for quick scan.
// Keeps the input in sync so a run is shareable as a link.
(function initFromUrl(){
  const params=new URLSearchParams(location.search);
  const q=params.get("q")||params.get("query")||params.get("user");
  if(params.get("one")==="1"||params.get("quick")==="1") $("one").checked=true;
  if(q){ $("q").value=q; find(); }
})();
</script>
</body>
</html>
